<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MP Smart Analyzer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="mode-youth quick-mode">
    <main class="app">
      <!-- 1 · Header -->
      <header class="app-header">
        <div class="header-brand">
          <div class="logo-mark" aria-hidden="true">MP</div>
          <div class="header-titles">
            <h1 class="product-name">MP Smart Analyzer</h1>
            <p class="product-tagline" id="productTagline"></p>
          </div>
        </div>
        <div class="header-actions">
          <div class="sys-pill" aria-live="polite">
            <span class="sys-dot" aria-hidden="true"></span>
            <span id="systemStatusText"></span>
          </div>
          <div class="exp-toggle" role="group" aria-labelledby="expModeLabel">
            <span class="exp-toggle-label" id="expModeLabel"></span>
            <button type="button" class="chip" id="btnModeYouth" aria-pressed="true"></button>
            <button type="button" class="chip" id="btnModePro" aria-pressed="false"></button>
          </div>
          <div class="exp-toggle" role="group" aria-labelledby="quickModeLabel">
            <span class="exp-toggle-label" id="quickModeLabel"></span>
            <button type="button" class="chip is-active" id="btnModeQuick" aria-pressed="true"></button>
            <button type="button" class="chip" id="btnModeRich" aria-pressed="false"></button>
          </div>
          <label class="ctrl-select">
            <span id="uiLangLabel"></span>
            <select id="lang" aria-label="UI language">
              <option value="he" selected>עברית</option>
              <option value="en">English</option>
            </select>
          </label>
          <button type="button" class="btn btn-ghost btn-sm" id="btnSample"></button>
          <button type="button" class="btn btn-ghost btn-sm" id="btnClear"></button>
        </div>
      </header>

      <div class="app-status-row">
        <div id="status" class="status" role="status" aria-live="polite" aria-atomic="true"></div>
      </div>

      <nav class="tabs" aria-label="Mobile workspace">
        <button type="button" id="tabInput" class="tab is-active"></button>
        <button type="button" id="tabOutput" class="tab"></button>
      </nav>

      <!-- 2 · Workspace: Input | Output (LTR grid = lab layout) -->
      <div class="workspace" dir="ltr">
        <section class="ws-panel ws-input" id="panelInput">
          <header class="ws-head">
            <span class="ws-kicker" id="inputKicker"></span>
            <h2 class="ws-title" id="inputSectionTitle"></h2>
          </header>

          <ol class="flow-steps" id="stepsList" aria-label="Flow">
            <li><span class="flow-num">1</span><span id="step1"></span></li>
            <li><span class="flow-num">2</span><span id="step2"></span></li>
            <li><span class="flow-num">3</span><span id="step3"></span></li>
          </ol>

          <p class="ws-hint" id="inputHint"></p>

          <div class="input-stack">
            <label for="report" class="field-label" id="reportLabel"></label>
            <div class="guide-card" id="reportGuideBlock" role="note">
              <div class="guide-title" id="reportGuideTitle"></div>
              <ul class="guide-list">
                <li id="guide1"></li>
                <li id="guide2"></li>
                <li id="guide3"></li>
                <li id="guide4"></li>
              </ul>
            </div>
            <div class="editor-frame">
              <textarea
                id="report"
                class="editor editor--data"
                aria-labelledby="reportLabel"
                aria-describedby="inputHint reportGuideBlock"
                autocomplete="off"
                spellcheck="true"
                rows="16"
                placeholder=""
              ></textarea>
            </div>
          </div>

          <div class="input-meta">
            <span id="charCount" class="meta-text"></span>
            <span id="lenBadge" class="tag tag-short"></span>
          </div>
        </section>

        <section class="ws-panel ws-output" id="panelOutput">
          <header class="ws-head">
            <span class="ws-kicker ws-kicker--violet" id="outputKicker"></span>
            <h2 class="ws-title" id="outputSectionTitle"></h2>
          </header>

          <div class="metric-row" aria-live="polite">
            <div class="metric" id="pillDetected">
              <span class="metric-label" id="pillDetectedKey"></span>
              <span class="metric-value" id="pillDetectedVal">—</span>
            </div>
            <div class="metric metric--confidence" id="pillConfidence">
              <span class="metric-label" id="pillConfidenceKey"></span>
              <span class="metric-value" id="pillConfidenceVal">—</span>
            </div>
          </div>
          <p class="template-meta" id="templateLine" hidden>
            <span id="templateLineKey"></span>:
            <strong id="templateLineTitle">—</strong>
          </p>

          <section class="intel-brief" id="intelBrief" hidden aria-labelledby="intelBriefKicker">
            <div class="intel-brief-head">
              <span class="intel-brief-kicker" id="intelBriefKicker"></span>
            </div>
            <pre class="intel-brief-body" id="intelBriefBody"></pre>
          </section>

          <div class="editor-frame editor-frame--readonly">
            <textarea id="output" class="editor editor--output" readonly aria-label="Analysis output"></textarea>
          </div>

          <div class="secondary-actions">
            <button type="button" class="btn btn-secondary btn-compact" id="btnCopy"></button>
            <button type="button" class="btn btn-secondary btn-compact" id="btnDownload"></button>
          </div>

          <details class="debug-block">
            <summary id="debugSummary"></summary>
            <pre id="debug" class="debug-pre"></pre>
          </details>
        </section>
      </div>

      <!-- 3 · Controls dock -->
      <section class="controls-dock" aria-labelledby="settingsBarLabel">
        <div class="controls-dock-inner">
          <div class="settings-row">
            <div class="settings-head">
              <span class="settings-kicker" id="settingsBarLabel"></span>
              <div class="perspective-block" role="group" aria-labelledby="perspectiveLabel">
                <span class="perspective-label-text" id="perspectiveLabel"></span>
                <div class="exp-toggle exp-toggle--compact" role="presentation">
                  <button type="button" class="chip" id="btnPerspectiveInternal" aria-pressed="false"></button>
                  <button type="button" class="chip" id="btnPerspectiveExternal" aria-pressed="false"></button>
                  <button type="button" class="chip" id="btnPerspectiveNeutral" aria-pressed="true"></button>
                </div>
              </div>
            </div>
            <div class="settings-fields">
              <label class="ctrl-select ctrl-select--grow">
                <span id="lblOutputLang"></span>
                <select id="outputLang" aria-labelledby="lblOutputLang">
                  <option value="auto" selected>Auto</option>
                  <option value="he">Hebrew</option>
                  <option value="en">English</option>
                </select>
              </label>
              <label class="ctrl-select ctrl-select--grow">
                <span id="lblOutputType"></span>
                <select id="outputType" aria-labelledby="lblOutputType">
                  <option value="auto" selected>Auto</option>
                  <option value="instructions">Instructions</option>
                  <option value="summary">Summary</option>
                  <option value="client_report">Client report</option>
                  <option value="checklist">Checklist</option>
                </select>
              </label>
              <label class="ctrl-select ctrl-select--grow">
                <span id="lblTone"></span>
                <select id="tone" aria-labelledby="lblTone">
                  <option value="auto" selected>Auto</option>
                  <option value="professional">Professional</option>
                  <option value="sharp">Sharp</option>
                  <option value="client">Client-ready</option>
                  <option value="cursor">For AI (Cursor)</option>
                </select>
              </label>
            </div>
          </div>
          <div class="run-row">
            <button type="button" class="btn btn-run" id="btnAnalyze"></button>
          </div>
        </div>
      </section>

      <footer class="app-footer">
        <p id="footerLegal"></p>
        <p class="footer-meta" id="footerNote"></p>
      </footer>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>
    <script type="module" src="app.js"></script>
  </body>
</html>
